id: "tier4/implement-rbac"
name: "实现基于角色的访问控制 (RBAC)"
tier: 4
type: "http-server"
language: "go"
estimated_minutes: 30

api_contract:
  - "func setupRouter() http.Handler"
  - "type Role string"
  - "type Permission string"
  - "func NewRBACManager() *RBACManager"
  - "func (m *RBACManager) DefineRole(role Role, perms []Permission)"
  - "func (m *RBACManager) AssignRole(userID string, role Role) error"
  - "func (m *RBACManager) HasPermission(userID string, perm Permission) bool"
  - "func RBACMiddleware(rbac *RBACManager, required Permission) func(http.Handler) http.Handler"

verification_targets:
  - id: VT-RBAC-01
    category: authorization
    name: "无权限控制"
    severity: critical
    description: "所有用户可以执行所有操作，需要 RBAC"
    detection: "e2e test"

refactoring_targets:
  - "实现 Role/Permission 类型定义和管理"
  - "实现 RBAC 中间件检查权限"
  - "实现用户-角色映射"
  - "实现角色继承（admin 包含 editor 权限）"

code_smells:
  - "所有 handler 没有权限检查"
  - "用户认证 token 未与角色关联"
  - "硬编码 admin 用户列表"

metadata:
  files_to_modify: ["rbac.go", "middleware.go", "handlers.go", "main.go"]
  tags: ["feature", "security", "rbac", "middleware"]
