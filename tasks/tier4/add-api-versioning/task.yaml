id: "tier4/add-api-versioning"
name: "添加 API 版本控制 (v1/v2)"
tier: 4
type: "http-server"
language: "go"
estimated_minutes: 25

api_contract:
  - "func setupRouter() http.Handler"
  - "func setupV1Routes(mux *http.ServeMux, store *TodoStore)"
  - "func setupV2Routes(mux *http.ServeMux, store *TodoStore)"

verification_targets:
  - id: VT-VER-01
    category: api_design
    name: "单版本 API 无法演进"
    severity: high
    description: "只有一个版本的 API，添加新字段会破坏现有客户端"
    detection: "e2e test"

refactoring_targets:
  - "添加 /v1/ 路由前缀保持旧 API 不变"
  - "添加 /v2/ 路由前缀，新增 priority 和 tags 字段"
  - "v1 和 v2 共享同一 store，响应格式不同"
  - "无前缀路由重定向到 /v1/"

code_smells:
  - "API 路由没有版本前缀"
  - "Todo 结构体混合了 v1 和 v2 字段"
  - "响应格式与版本耦合"

metadata:
  files_to_modify: ["main.go", "handlers.go", "handlers_v2.go"]
  tags: ["feature", "api-versioning", "backward-compat"]
