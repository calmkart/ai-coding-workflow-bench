id: "tier2/fix-deep-copy"
name: "修复深拷贝"
tier: 2
type: "library"
language: "go"
estimated_minutes: 10

api_contract:
  - "func (c *Config) Clone() *Config"

verification_targets:
  - id: VT-COPY-01
    category: correctness
    name: "浅拷贝 bug"
    severity: high
    description: "嵌套 struct 的 Clone() 是浅拷贝，修改拷贝影响原始"
