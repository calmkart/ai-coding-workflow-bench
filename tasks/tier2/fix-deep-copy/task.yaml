refactoring_targets:
  - "修复 Clone() 为完全深拷贝"

code_smells:
  - "Clone() 只复制顶层字段，slice 和 map 共享引用"

metadata:
  files_to_modify: ["config.go"]
  tags: ["bugfix", "deep-copy"]
